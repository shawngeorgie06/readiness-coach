# XcodeGen spec — a deterministic fallback for regenerating the Xcode project.
# The checked-in ReadinessCoach.xcodeproj is the primary artifact; use this only
# if you prefer to regenerate it (e.g. on an older Xcode that predates
# file-system-synchronized groups) with:
#
#   brew install xcodegen
#   cd ios && xcodegen generate && open ReadinessCoach.xcodeproj
#
name: ReadinessCoach
options:
  bundleIdPrefix: com.readinesscoach
  deploymentTarget:
    iOS: "17.0"
  createIntermediateGroups: true
settings:
  base:
    SWIFT_VERSION: "5.0"
    TARGETED_DEVICE_FAMILY: "1,2"
    MARKETING_VERSION: "1.0"
    CURRENT_PROJECT_VERSION: "1"
targets:
  ReadinessCoach:
    type: application
    platform: iOS
    sources:
      - ReadinessCoach
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.readinesscoach.ReadinessCoach
        GENERATE_INFOPLIST_FILE: NO
        INFOPLIST_FILE: Info.plist
        CODE_SIGN_ENTITLEMENTS: ReadinessCoach.entitlements
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
        ASSETCATALOG_COMPILER_GLOBAL_ACCENT_COLOR_NAME: AccentColor
        ENABLE_PREVIEWS: YES
