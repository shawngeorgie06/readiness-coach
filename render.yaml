# Free personal deploy blueprint for Render.
# See docs/personal-free-deploy.md (Neon Postgres + keep-alive for 15-min idle).
#
# Free Render spins down after 15 minutes with no inbound traffic. This repo
# self-pings /health every 10 minutes (via RENDER_EXTERNAL_URL) and includes a
# GitHub Action keep-alive — set secret RENDER_HEALTH_URL after first deploy.

services:
  - type: web
    name: readiness-coach-api
    runtime: docker
    plan: free
    region: oregon
    rootDir: backend
    dockerfilePath: ./Dockerfile
    healthCheckPath: /health
    envVars:
      - key: NODE_ENV
        value: production
      - key: DATABASE_URL
        sync: false
      - key: API_TOKEN
        sync: false
      # Must match the User ID in the iOS app — shared token is bound to this user only.
      - key: API_TOKEN_USER_ID
        sync: false
      - key: SESSION_SECRET
        generateValue: true
      - key: APPLE_BUNDLE_ID
        value: com.readinesscoach.ReadinessCoach
      - key: LLM_API_KEY
        sync: false
      - key: LLM_BASE_URL
        value: https://api.openai.com/v1
      - key: LLM_MODEL
        value: gpt-4o-mini
